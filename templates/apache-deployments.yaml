      labels:
        app: apache
        instance: apache-2
        release: {{ .Release.Name }}
    spec:
      containers:
      - name: apache
        image: {{ .Values.apache.image }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: apache-page
          mountPath: /usr/local/apache2/htdocs/index.html
