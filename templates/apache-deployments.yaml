apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-apache-1
spec:
  replicas: {{ .Values.apache1.replicas }}
  selector:
    matchLabels:
      app: apache
      instance: apache-1
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: apache
        instance: apache-1
        release: {{ .Release.Name }}
    spec:
      containers:
      - name: apache
        image: {{ .Values.apache.image }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: apache-page
          mountPath: /usr/local/apache2/htdocs/index.html
          subPath: index.html
      volumes:
      - name: apache-page
        configMap:
          name: {{ .Release.Name }}-apache-page-1
---
